version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - app2
      - app3
  app:
    image: local
    # ports:
    #   - "8001:8000"
    depends_on:
      - redis
    env_file:
      - ./server/src/.env
    environment:
      INSTANCE_ID: app1
      # REDIS_HOST: redis

  app2:
    image: local
    # ports:
    #   - "8002:8000"
    depends_on:
      - redis
    env_file:
      - ./server/src/.env
    environment:
      INSTANCE_ID: app2
      # REDIS_HOST: redis

  app3:
    image: local
    # ports:
    #   - "8003:8000"
    depends_on:
      - redis
    env_file:
      - ./server/src/.env
    environment:
      INSTANCE_ID: app3
      # REDIS_HOST: redis

